# Instrucciones de Mitigación para el Servidor Web (Apache)
# Estas directivas deben agregarse a apache2.conf o dentro del VirtualHost correspondiente.

# ---------------------------------------------------------
# 1. Mitigación contra DoS (Agotamiento de recursos / Slowloris)
# ---------------------------------------------------------
# El ataque Slowloris funciona manteniendo peticiones HTTP abiertas al enviarlas muy lentamente.
# Solución: Habilitar y configurar mod_reqtimeout.

<IfModule reqtimeout_module>
  # RequestReadTimeout establece tiempos límite para recibir la petición.
  # header=20-40,MinRate=500: Espera 20s para los headers, aumenta máximo a 40s si recibe al menos 500 bytes/s.
  # body=20,MinRate=500: Igual lógica para el cuerpo de la petición.
  RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500
</IfModule>

# Notas adicionales para DoS:
# - Considerar la instalación de mod_evasive o mod_qos para limitar conexiones simultáneas por IP.
# - En Nginx, se mitigaría usando las directivas client_body_timeout y client_header_timeout.

# ---------------------------------------------------------
# 2. Reducción de la Superficie de Reconocimiento (Information Disclosure)
# ---------------------------------------------------------
# Por defecto, los servidores informan su versión exacta y sistema operativo en las cabeceras HTTP (Server: Apache/2.4.41 (Ubuntu)).
# Solución: Limitar la información mostrada.

# ServerTokens Prod: Muestra solo "Server: Apache" sin versiones ni SO.
ServerTokens Prod

# ServerSignature Off: Desactiva el pie de página generado por el servidor en páginas de error (ej. 404).
ServerSignature Off
