# ============================================================
# ARCHIVO: lamp/apache2_lab.conf
# PROPÓSITO: Configuración de Apache para el laboratorio
# DOMINIO:   satp-laboratorio.local
# ============================================================
# CONTIENE DOS BLOQUES:
#   A — CONFIGURACIÓN VULNERABLE  (Slowloris / DoS demo)
#   B — CONFIGURACIÓN MITIGADA    (mod_reqtimeout hardening)
#
# Por defecto: BLOQUE A activo (modo vulnerable del lab).
# Para activar mitigación: comentar BLOQUE A, descomentar B.
# ============================================================


# ==============================================================
# BLOQUE A — MODO VULNERABLE (para demostración de Slowloris V2)
# ==============================================================
# Slowloris abre cientos de conexiones TCP y envía las cabeceras
# HTTP a una velocidad mínima (pocos bytes cada varios segundos).
# Apache mantiene cada conexión en espera durante el tiempo
# configurado en Timeout y KeepAliveTimeout.
# Si esos valores son altos, los workers de Apache se agotan
# y el servidor deja de responder (DoS).
# ──────────────────────────────────────────────────────────────

# Timeout global alto: da 600 segundos a cada conexión
Timeout 600

# KeepAlive: permite reutilizar la conexión TCP (vector Slowloris)
KeepAlive On
MaxKeepAliveRequests 500

# KeepAliveTimeout alto (75s): el servidor espera 75s de inactividad
# antes de cerrar la conexión. Slowloris aprovecha exactamente esto.
KeepAliveTimeout 75

# Revelar versión exacta del servidor (ayuda al reconocimiento)
# Resultado en cabecera: Server: Apache/2.4.57 (Debian)
ServerTokens Full
ServerSignature On

# ──────────────────────────────────────────────────────────────
# COMANDO DE ATAQUE Slowloris (desde Kali Linux / misma red):
#
#   # Instalar slowhttptest:
#   sudo apt install -y slowhttptest
#
#   # Ataque de cabeceras lentas (Slowloris clásico):
#   slowhttptest -c 500 -H -i 10 -r 200 -t GET \
#                -u http://localhost:8080 -x 60 -p 5
#
#   Parámetros:
#     -c 500  → 500 conexiones simultáneas
#     -H      → Modo Slowloris (slow headers)
#     -i 10   → Envía un header extra cada 10 segundos
#     -r 200  → 200 nuevas conexiones por segundo
#     -x 60   → Duración del test: 60 segundos
#     -p 5    → Confirma DoS si el servidor no responde en 5s
#
#   # Verificar efecto (desde otra terminal):
#   curl -v --max-time 10 http://localhost:8080
#   → Connection timed out = DoS exitoso
#
#   # Ver conexiones abiertas en el contenedor:
#   docker exec sat_web ss -tn state ESTABLISHED | wc -l
#
#   # Reconocimiento previo (Nmap - Estudiante 2):
#   nmap -sV -p 8080 --script http-headers localhost
#   → Identifica versión Apache y cabeceras KeepAlive expuestas
# ──────────────────────────────────────────────────────────────


# ==============================================================
# BLOQUE B — MODO SEGURO (Mitigación DoS + Hardening)
# ==============================================================
# Para activar: comentar todas las directivas del BLOQUE A
# y descomentar las siguientes.
# ==============================================================

# --- MITIGACIÓN 1: mod_reqtimeout (anti-Slowloris) -----------
# Obliga al cliente a completar la petición en tiempo límite.
# Si el cliente no mantiene la tasa mínima de bytes/segundo
# (500 B/s), Apache cierra la conexión automáticamente.
#
# Activar en el contenedor:
#   docker exec sat_web a2enmod reqtimeout
#   docker restart sat_web
#
# <IfModule reqtimeout_module>
#     # header=20-40,MinRate=500:
#     #   Tiempo inicial: 20s
#     #   Máximo extendible a 40s si el cliente envía ≥500 B/s
#     # body=20,MinRate=500:
#     #   Igual para el cuerpo de la petición
#     RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500
# </IfModule>

# --- MITIGACIÓN 2: Timeouts agresivos ------------------------
# Timeout 30
# KeepAliveTimeout 5
# MaxKeepAliveRequests 100

# --- MITIGACIÓN 3: Ocultar versión del servidor --------------
# Evita que el atacante identifique la versión exacta de Apache
# para buscar CVEs asociados.
# ServerTokens Prod        → Muestra solo "Server: Apache"
# ServerSignature Off      → Elimina pie de página en errores
#
# ServerTokens Prod
# ServerSignature Off

# --- MITIGACIÓN 4: Limitar tamaño de peticiones --------------
# LimitRequestBody 10485760   → Máximo 10 MB por petición

# --- MITIGACIÓN 5: Restringir métodos HTTP -------------------
# <Directory /var/www/html>
#     <LimitExcept GET POST HEAD>
#         deny from all
#     </LimitExcept>
# </Directory>

# --- MITIGACIÓN 6: mod_evasive (anti-brute-force HTTP) ------
# <IfModule mod_evasive24.c>
#     DOSHashTableSize    3097
#     DOSPageCount        5
#     DOSSiteCount        50
#     DOSPageInterval     1
#     DOSSiteInterval     1
#     DOSBlockingPeriod   10
# </IfModule>
